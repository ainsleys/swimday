<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SWIM DAY</title>
<meta name="theme-color" content="#f47a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Swim Day">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amarante&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Boecklins Universe';
  src: url('fonts/boecklins-universe.woff') format('woff');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
:root {
  --orange: #f47a1a;
  --orange-light: #ff9a40;
  --orange-dark: #c45a10;
  --white: #ffffff;
  --black: #111111;
  --gray: #888888;
  --gray-light: #cccccc;
  --now-bg: rgba(244,122,26,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  font-family: 'Fraunces', Georgia, serif;
  min-height: 100vh;
  color: var(--black);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

#sunset-bg {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── Header ── */
header {
  text-align: center;
  padding: 1.8rem 1rem 0.8rem;
  position: relative;
  z-index: 1;
}
.title {
  font-family: 'Boecklins Universe', 'Amarante', Georgia, serif;
  font-size: clamp(2rem, 10vw, 3.8rem);
  font-weight: normal;
  color: var(--white);
  letter-spacing: 0.04em;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  line-height: 1;
}
.header-meta {
  display: flex; justify-content: center; gap: 1rem;
  margin-top: 0.5rem; flex-wrap: wrap; align-items: center;
}
.clock {
  font-size: 0.7rem; color: rgba(255,255,255,0.85);
  letter-spacing: 0.12em; font-variant-numeric: tabular-nums; font-weight: 500;
}
.loc-badge {
  font-size: 0.55rem; color: rgba(255,255,255,0.5); letter-spacing: 0.05em;
}

/* Date bar */
.date-bar {
  display: flex; justify-content: center; gap: 0.4rem;
  margin: 0.6rem auto 0; flex-wrap: wrap; align-items: center;
}
.btn {
  font-family: inherit; font-size: 0.55rem; font-weight: 600;
  letter-spacing: 0.08em; padding: 0.35rem 0.75rem;
  border: 1.5px solid rgba(255,255,255,0.4); border-radius: 4px;
  background: transparent; color: rgba(255,255,255,0.85);
  cursor: pointer; text-transform: uppercase; transition: all 0.15s;
}
.btn:hover, .btn.active {
  background: var(--white); color: var(--black); border-color: var(--white);
}
.date-input-wrap { display: none; align-items: center; gap: 0.35rem; }
.date-input-wrap.show { display: flex; }
input[type="date"] {
  font-family: inherit; font-size: 0.55rem; padding: 0.3rem 0.5rem;
  background: rgba(0,0,0,0.3); border: 1.5px solid rgba(255,255,255,0.35);
  border-radius: 4px; color: var(--white); cursor: pointer; color-scheme: dark;
}
.viewing-label {
  font-size: 0.52rem; color: rgba(255,255,255,0.7); letter-spacing: 0.06em;
  text-align: center; margin-top: 0.35rem; display: none; font-weight: 500;
}
.viewing-label.show { display: block; }

/* ── Cards ── */
.cards {
  position: relative; z-index: 1;
  padding: 0.8rem 0.5rem 3rem;
  max-width: 460px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 0.5rem;
}

.card {
  background: var(--white);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 8px rgba(0,0,0,0.12);
}

.card.is-seasonal {
  background: #ede8e2;
  opacity: 0.75;
}
.card.is-seasonal .card-name { color: #887870; }
.card.is-seasonal .status-pill { opacity: 0.9; }

/* ── Card header ── */
.card-header {
  padding: 0.6rem 0.7rem 0.35rem;
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 0.5rem;
}
.card-name {
  font-size: 0.82rem; font-weight: 700; color: var(--black); line-height: 1.25;
}

.status-pill {
  flex-shrink: 0; font-size: 0.48rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.18rem 0.5rem; border-radius: 3px;
  white-space: nowrap; margin-top: 0.1rem;
}
.pill-now { background: var(--orange); color: var(--white); }
.pill-today {
  background: rgba(244,122,26,0.08); color: var(--orange-dark);
  border: 1px solid rgba(244,122,26,0.2);
}
.pill-closed { background: #f0f0f0; color: var(--gray); }
.pill-season { background: #fff0e0; color: #a05820; }

/* ── Status detail line ── */
.card-detail {
  padding: 0 0.7rem 0.5rem; font-size: 0.52rem;
  color: var(--gray); letter-spacing: 0.02em;
  display: flex; gap: 0.6rem; align-items: center;
}
.card-detail .now-text { color: var(--orange-dark); font-weight: 600; }
.card-detail .dist { margin-left: auto; }

/* ── Sessions ── */
.card-sessions { padding: 0 0.7rem 0.55rem; }
.sessions-list {
  list-style: none; display: flex; flex-direction: column; gap: 1px;
}
.session-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.28rem 0.45rem; border-radius: 4px; font-size: 0.56rem;
}
.session-row.now { background: var(--now-bg); }
.session-name { color: #555; }
.session-time {
  color: var(--black); font-weight: 600; letter-spacing: 0.02em;
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.session-row.now .session-name { color: var(--orange-dark); }
.session-row.now .session-time { color: var(--orange-dark); font-weight: 700; }

.card-note {
  padding: 0.15rem 0.7rem 0.5rem; font-size: 0.52rem;
  color: var(--gray); line-height: 1.5;
}

/* ── Card footer ── */
.card-foot {
  padding: 0.35rem 0.7rem; border-top: 1px solid #f0f0f0;
  display: flex; justify-content: space-between; align-items: center;
}
.schedule-link {
  font-size: 0.46rem; font-weight: 600; color: var(--orange);
  text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase;
}
.schedule-link:hover { color: var(--orange-dark); }
.data-tag {
  font-size: 0.38rem; color: var(--gray-light);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.data-tag.live { color: #88b888; }

/* ── Footer ── */
.app-footer {
  text-align: center; padding: 1rem;
  font-size: 0.45rem; font-weight: 500;
  color: rgba(0,0,0,0.25); letter-spacing: 0.08em;
  text-transform: uppercase; position: relative; z-index: 1;
}
.app-footer a { color: rgba(0,0,0,0.3); text-decoration: none; }
.app-footer a:hover { color: var(--orange); }

.loading {
  text-align: center; padding: 4rem 2rem;
  font-size: 0.8rem; font-weight: 600;
  color: rgba(255,255,255,0.6); letter-spacing: 0.15em;
  text-transform: uppercase; position: relative; z-index: 1;
}

/* Pull to refresh */
.ptr-indicator {
  position: fixed; top: 0; left: 0; right: 0;
  height: 3px; background: var(--orange);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.15s; z-index: 200;
}
.ptr-indicator.active { transform: scaleX(1); }

.install-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 0.8rem;
  background: var(--white); color: var(--black);
  font-size: 0.55rem; font-weight: 500;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
}
.install-bar span { flex: 1; }
.install-bar button {
  font-family: inherit; font-size: 0.5rem; font-weight: 700;
  padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer;
  border: none; text-transform: uppercase; letter-spacing: 0.06em;
}
.install-bar button:first-of-type {
  background: var(--orange); color: var(--white);
}
.install-bar button:last-of-type {
  background: transparent; color: var(--gray); font-size: 0.7rem;
  padding: 0.2rem 0.4rem;
}

@media (min-width: 720px) { .cards { max-width: 520px; } }
</style>
</head>
<body>

<div class="ptr-indicator" id="ptr"></div>
<canvas id="sunset-bg" aria-hidden="true"></canvas>

<header>
  <div class="title">Swim Day</div>
  <div class="header-meta">
    <div class="clock" id="clock">--:-- --</div>
    <div class="loc-badge" id="loc-badge"></div>
  </div>
  <div class="date-bar">
    <button class="btn active" id="today-btn" onclick="setToday()">Today</button>
    <button class="btn" id="future-btn" onclick="toggleFuture()">Future Date</button>
    <div class="date-input-wrap" id="date-wrap">
      <input type="date" id="future-input" onchange="onDateChange()">
      <button class="btn" onclick="setToday()">&times;</button>
    </div>
  </div>
  <div class="viewing-label" id="viewing-label"></div>
</header>

<div id="cards-root">
  <div class="loading" id="loading">Loading&hellip;</div>
</div>

<div class="install-bar" id="install-bar" style="display:none">
  <span class="install-msg">Add Swim Day to your home screen</span>
  <button onclick="installApp()" id="install-btn">Install</button>
  <button onclick="dismissInstall()">&times;</button>
</div>

<footer class="app-footer">
  Swim Day &nbsp;&middot;&nbsp; East Bay CA &nbsp;&middot;&nbsp;
  <a href="https://github.com/ainsleys/swimday" target="_blank" rel="noopener">GitHub</a>
</footer>

<script>
// ── Pixel sunset background ──────────────────────────────────────────────────
function renderSunset() {
  const canvas = document.getElementById('sunset-bg');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const PX = 5;
  const sw = Math.ceil(W / PX);
  const sh = Math.ceil(H / PX);

  canvas.width = sw;
  canvas.height = sh;

  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(sw, sh);
  const d = img.data;

  // Gradient: dark red → red → orange → amber → yellow (warm sunset)
  const stops = [
    [0.00,  50,  4,  4],
    [0.10,  95, 10,  8],
    [0.20, 155, 18, 10],
    [0.30, 200, 30, 12],
    [0.40, 225, 55, 15],
    [0.50, 238, 88, 18],
    [0.60, 242,125, 22],
    [0.70, 240,165, 28],
    [0.80, 238,200, 38],
    [0.90, 240,225, 52],
    [1.00, 248,242, 68],
  ];

  for (let y = 0; y < sh; y++) {
    const t = y / sh;
    let si = 0;
    while (si < stops.length - 2 && stops[si + 1][0] < t) si++;
    const s0 = stops[si], s1 = stops[si + 1];
    const f = s1[0] > s0[0] ? (t - s0[0]) / (s1[0] - s0[0]) : 0;

    for (let x = 0; x < sw; x++) {
      const noise = (Math.random() - 0.5) * 0.3;
      const ff = Math.max(0, Math.min(1, f + noise));
      const i = (y * sw + x) * 4;
      d[i]     = Math.round(s0[1] + (s1[1] - s0[1]) * ff);
      d[i + 1] = Math.round(s0[2] + (s1[2] - s0[2]) * ff);
      d[i + 2] = Math.round(s0[3] + (s1[3] - s0[3]) * ff);
      d[i + 3] = 255;
    }
  }

  ctx.putImageData(img, 0, 0);
}

renderSunset();
let _sunsetTimer;
window.addEventListener('resize', () => {
  clearTimeout(_sunsetTimer);
  _sunsetTimer = setTimeout(renderSunset, 200);
});

// ── App state ────────────────────────────────────────────────────────────────
let pools = null, userLat = null, userLng = null, viewDate = null;

function parseTime(s) {
  if (!s) return -1;
  const m = s.toLowerCase().replace(/\s/g,'').match(/^(\d+):?(\d*)(am|pm)$/);
  if (!m) return -1;
  let h = +m[1], min = +(m[2]||0);
  if (m[3]==='pm' && h!==12) h+=12;
  if (m[3]==='am' && h===12) h=0;
  return h*60+min;
}
function nowMins() { const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function dayOf(d) { return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][d.getDay()]; }
function fmtTime(s) { return s.toUpperCase().replace(/([AP]M)$/,' $1').trim(); }
function fmtDate(d) {
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${D[d.getDay()]} ${M[d.getMonth()]} ${d.getDate()}`;
}
function haversine(a,b,c,d) {
  const R=3959,dl=(c-a)*Math.PI/180,dL=(d-b)*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dL/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function inSeason(p,d) { return !p.seasonOpen || d>=new Date(p.seasonOpen); }
function isClosedDate(p,d) {
  if (!p.closedDates) return false;
  const ds = d.toISOString().split('T')[0];
  return p.closedDates.some(c => ds >= c.start && ds <= (c.end || c.start));
}
function sessionsFor(p,d) {
  if (!inSeason(p,d)) return [];
  if (isClosedDate(p,d)) return [];
  return (p.schedule&&p.schedule[dayOf(d)])||[];
}
function mergedSessions(ss) {
  if (!ss.length) return [];
  const sorted=[...ss].sort((a,b)=>parseTime(a.open)-parseTime(b.open));
  const out=[{...sorted[0]}];
  for (let i=1;i<sorted.length;i++) {
    const prev=out[out.length-1],cur=sorted[i];
    if (cur.label===prev.label&&parseTime(cur.open)<=parseTime(prev.close)+15) {
      if (parseTime(cur.close)>parseTime(prev.close)) prev.close=cur.close;
    } else out.push({...cur});
  }
  return out;
}
function openNow(p) {
  if (viewDate) return false;
  const ss=sessionsFor(p,new Date()); if(!ss.length) return false;
  const nm=nowMins();
  return ss.some(s=>nm>=parseTime(s.open)&&nm<parseTime(s.close));
}

function updateClock() {
  const d=new Date(); let h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('clock').textContent=
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
}
setInterval(updateClock,1000); updateClock();

function setToday(){
  viewDate=null;
  document.getElementById('today-btn').classList.add('active');
  document.getElementById('future-btn').classList.remove('active');
  document.getElementById('date-wrap').classList.remove('show');
  document.getElementById('viewing-label').classList.remove('show');
  if(pools) render();
}
function toggleFuture(){
  const w=document.getElementById('date-wrap');
  if(w.classList.contains('show')){setToday();return;}
  w.classList.add('show');
  document.getElementById('future-btn').classList.add('active');
  document.getElementById('today-btn').classList.remove('active');
  const t=new Date().toISOString().split('T')[0];
  document.getElementById('future-input').value=t;
  document.getElementById('future-input').min=t;
  onDateChange();
}
function onDateChange(){
  const v=document.getElementById('future-input').value; if(!v) return;
  const[y,mo,d]=v.split('-').map(Number);
  viewDate=new Date(y,mo-1,d);
  const lbl=document.getElementById('viewing-label');
  lbl.textContent=`Showing ${fmtDate(viewDate).toUpperCase()}`;
  lbl.classList.add('show');
  if(pools) render();
}
function initGeo(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p=>{
    userLat=p.coords.latitude;userLng=p.coords.longitude;
    document.getElementById('loc-badge').textContent='Sorting by distance';
    if(pools) render();
  },()=>{},{timeout:8000});
}

function sortedPools(){
  const arr=Object.values(pools),date=viewDate||new Date();
  arr.sort((a,b)=>{
    const ao=openNow(a)?0:1,bo=openNow(b)?0:1;
    if(ao!==bo) return ao-bo;
    const at=sessionsFor(a,date).length>0?0:1,bt=sessionsFor(b,date).length>0?0:1;
    if(at!==bt) return at-bt;
    if(userLat!==null) return haversine(userLat,userLng,a.lat,a.lng)-haversine(userLat,userLng,b.lat,b.lng);
    return 0;
  });
  return arr;
}

function render(){
  const date=viewDate||new Date(),root=document.getElementById('cards-root');
  root.innerHTML='';
  const wrap=document.createElement('div');wrap.className='cards';
  for(const p of sortedPools()) wrap.appendChild(buildCard(p,date));
  root.appendChild(wrap);
}

function buildCard(pool,date){
  const raw=sessionsFor(pool,date),ss=mergedSessions(raw);
  const isNow=openNow(pool),isSeason=!inSeason(pool,date);
  const isClosed=isClosedDate(pool,date);
  const hasSessions=ss.length>0,nm=viewDate?-1:nowMins();

  const card=document.createElement('div');
  card.className='card'+(isSeason?' is-seasonal':'');

  // Header: name + pill
  const hdr=document.createElement('div');hdr.className='card-header';
  const name=document.createElement('div');name.className='card-name';
  name.textContent=pool.name;
  hdr.appendChild(name);

  const pill=document.createElement('span');
  if(isNow){pill.className='status-pill pill-now';pill.textContent='Open Now';}
  else if(isSeason){pill.className='status-pill pill-season';pill.textContent='Seasonal';}
  else if(isClosed){pill.className='status-pill pill-closed';pill.textContent='Closed — Holiday';}
  else if(hasSessions){pill.className='status-pill pill-today';pill.textContent=viewDate?'Open':'Open Today';}
  else{pill.className='status-pill pill-closed';pill.textContent='Closed';}
  hdr.appendChild(pill);
  card.appendChild(hdr);

  // Detail line
  const detail=document.createElement('div');detail.className='card-detail';
  if(isNow){
    const cur=ss.find(s=>nm>=parseTime(s.open)&&nm<parseTime(s.close));
    if(cur){
      const sp=document.createElement('span');sp.className='now-text';
      sp.textContent=`${cur.label} until ${fmtTime(cur.close)}`;
      detail.appendChild(sp);
    }
  } else if(isSeason){
    const sp=document.createElement('span');
    sp.textContent=pool.seasonalNote||'Closed for season';
    detail.appendChild(sp);
  } else if(isClosed){
    // Find the matching closure reason
    const ds=date.toISOString().split('T')[0];
    const c=pool.closedDates.find(c=>ds>=c.start&&ds<=(c.end||c.start));
    if(c){
      const sp=document.createElement('span');
      sp.textContent=c.reason||'Closed for holiday';
      detail.appendChild(sp);
    }
  } else if(hasSessions&&!viewDate){
    let next=null;
    for(const s of raw){const o=parseTime(s.open);if(o>nm&&(next===null||o<next.m))next={m:o,t:s.open};}
    if(next){
      const sp=document.createElement('span');
      sp.textContent=`Next session at ${fmtTime(next.t)}`;
      detail.appendChild(sp);
    }
  } else if(!hasSessions&&!isSeason){
    const sp=document.createElement('span');
    sp.textContent=pool.fallbackNote||'No sessions today';
    detail.appendChild(sp);
  }
  if(userLat!==null){
    const sp=document.createElement('span');sp.className='dist';
    sp.textContent=`${haversine(userLat,userLng,pool.lat,pool.lng).toFixed(1)} mi`;
    detail.appendChild(sp);
  }
  card.appendChild(detail);

  // Sessions
  if(hasSessions){
    const sec=document.createElement('div');sec.className='card-sessions';
    const ul=document.createElement('ul');ul.className='sessions-list';
    ss.forEach(s=>{
      const o=parseTime(s.open),c=parseTime(s.close);
      const active=nm>=0&&nm>=o&&nm<c;
      const li=document.createElement('li');
      li.className='session-row'+(active?' now':'');
      const sn=document.createElement('span');sn.className='session-name';sn.textContent=s.label;
      const st=document.createElement('span');st.className='session-time';st.textContent=`${fmtTime(s.open)} \u2013 ${fmtTime(s.close)}`;
      li.appendChild(sn);li.appendChild(st);
      ul.appendChild(li);
    });
    sec.appendChild(ul);
    card.appendChild(sec);
  }

  // Footer
  const foot=document.createElement('div');foot.className='card-foot';
  const link=document.createElement('a');link.className='schedule-link';
  link.href=pool.website;link.target='_blank';link.rel='noopener';
  link.textContent='\u2197 Full Schedule';
  const tag=document.createElement('span');
  tag.className='data-tag'+(pool.dataSource==='live'?' live':'');
  tag.textContent=pool.dataSource==='live'?'\u25CF live':'\u25CB estimated';
  foot.appendChild(link);foot.appendChild(tag);
  card.appendChild(foot);

  return card;
}

async function init(){
  try{
    const r=await fetch('data/schedules.json'),d=await r.json();
    pools=d.pools;
    document.getElementById('loading').remove();
    render();
  }catch(e){document.getElementById('loading').textContent='Failed to load schedule data.';}
  initGeo();
  setInterval(()=>{if(pools&&!viewDate)render();},60000);
}
init();

// ── Pull to refresh ─────────────────────────────────────────────────────────
let _ptrStart = 0, _ptrActive = false;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0) _ptrStart = e.touches[0].clientY;
  else _ptrStart = 0;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!_ptrStart) return;
  const dy = e.touches[0].clientY - _ptrStart;
  const ptr = document.getElementById('ptr');
  if (dy > 30 && window.scrollY === 0) {
    const progress = Math.min(1, (dy - 30) / 100);
    ptr.style.transform = `scaleX(${progress})`;
    if (progress >= 1) _ptrActive = true;
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  const ptr = document.getElementById('ptr');
  if (_ptrActive) {
    ptr.classList.add('active');
    location.reload();
  } else {
    ptr.style.transform = 'scaleX(0)';
  }
  _ptrStart = 0;
  _ptrActive = false;
});

// ── PWA ──────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBar('android');
});

function showInstallBar(type) {
  const bar = document.getElementById('install-bar');
  if (!bar || localStorage.getItem('install-dismissed')) return;
  const msg = bar.querySelector('.install-msg');
  if (type === 'ios') {
    msg.innerHTML = 'Add Swim Day: tap <span style="font-size:0.75rem">&#x2191;</span> <strong>Share</strong> then <strong>Add to Home Screen</strong>';
    const btn = document.getElementById('install-btn');
    if (btn) btn.style.display = 'none';
  }
  bar.style.display = 'flex';
}

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-bar').style.display = 'none';
    });
  }
}

function dismissInstall() {
  document.getElementById('install-bar').style.display = 'none';
  localStorage.setItem('install-dismissed', '1');
}

// iOS detection — no beforeinstallprompt, so show manual instructions
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.navigator.standalone === true;
if (isIOS && !isStandalone) {
  showInstallBar('ios');
}
</script>
