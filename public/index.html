<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SWIM DAY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #110b05;
  --bg2:         #1c1308;
  --gold:        #c8890e;
  --gold-bright: #e8aa20;
  --gold-dim:    #7a5508;
  --amber:       #d4720a;
  --cream:       #f0e4c2;
  --cream-dark:  #d8ccaa;
  --ink:         #1e1208;
  --ink-mid:     #3a2810;
  --open-g:      #2a6e40;
  --open-g-bg:   #e8f4ec;
  --closed-fg:   #887060;
  --season-fg:   #a05820;
  --session-hl:  #fff8e0;
  --session-hl-border: #c8890e;
  --font-fantasy: 'Cinzel Decorative', Georgia, serif;
  --font-serif:   'Cinzel', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  font-family: var(--font-serif);
  min-height: 100vh;
  color: var(--ink);
  -webkit-tap-highlight-color: transparent;
}

/* Warm top glow */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; height: 40vh;
  background: radial-gradient(ellipse at 50% -10%, rgba(200,137,14,0.18) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem 1rem 1rem;
}

.title {
  font-family: var(--font-fantasy);
  font-size: clamp(1.6rem, 8vw, 3.2rem);
  color: var(--gold-bright);
  letter-spacing: 0.06em;
  text-shadow: 0 2px 20px rgba(200,137,14,0.5), 0 0 60px rgba(200,137,14,0.2);
  line-height: 1.1;
}

.subtitle {
  font-family: var(--font-serif);
  font-size: 0.6rem;
  color: var(--gold-dim);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}

.header-meta {
  display: flex;
  justify-content: center;
  gap: 1.2rem;
  margin-top: 0.9rem;
  flex-wrap: wrap;
  align-items: center;
}

.clock {
  font-size: 0.7rem;
  color: var(--amber);
  letter-spacing: 0.12em;
  font-variant-numeric: tabular-nums;
}

.loc-badge {
  font-size: 0.58rem;
  color: var(--gold-dim);
  letter-spacing: 0.06em;
}

/* Date bar */
.date-bar {
  display: flex;
  justify-content: center;
  gap: 0.6rem;
  margin: 0.9rem auto 0;
  flex-wrap: wrap;
  align-items: center;
  padding: 0 1rem;
}

.btn {
  font-family: var(--font-serif);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  padding: 0.45rem 0.9rem;
  border: 1.5px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn:hover, .btn.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}

.date-input-wrap { display: none; align-items: center; gap: 0.5rem; }
.date-input-wrap.show { display: flex; }

input[type="date"] {
  font-family: var(--font-serif);
  font-size: 0.6rem;
  padding: 0.4rem 0.6rem;
  background: var(--bg2);
  border: 1.5px solid var(--gold-dim);
  color: var(--amber);
  cursor: pointer;
  color-scheme: dark;
}

.viewing-label {
  font-size: 0.55rem;
  color: var(--amber);
  letter-spacing: 0.08em;
  text-align: center;
  margin-top: 0.5rem;
  display: none;
}
.viewing-label.show { display: block; }

/* ── Cards container ── */
.cards {
  position: relative;
  z-index: 1;
  padding: 1.2rem 0.75rem 3rem;
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

/* ── Pool card ── */
.card {
  background: var(--cream);
  border: 1px solid var(--cream-dark);
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: box-shadow 0.2s;
}

.card.is-open-now {
  box-shadow: 0 2px 20px rgba(200,137,14,0.35);
  border-color: var(--gold-dim);
}

/* Collapsed closed/seasonal card */
.card.collapsed .card-expand-area { display: none; }
.card.collapsed canvas { display: none; }

/* Card header row (always visible) */
.card-head {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 0.85rem;
  cursor: pointer;
  user-select: none;
}

.card-thumb {
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  overflow: hidden;
  background: var(--ink);
}

.card-thumb canvas {
  width: 52px !important;
  height: 52px !important;
  display: block;
  image-rendering: pixelated;
}

.card-head-info { flex: 1; min-width: 0; }

.card-pool-name {
  font-family: var(--font-serif);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-status-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-top: 0.25rem;
  flex-wrap: wrap;
}

.status-pill {
  font-size: 0.5rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border-radius: 2px;
  font-weight: 600;
}

.pill-open {
  background: var(--open-g-bg);
  color: var(--open-g);
  border: 1px solid #b8dfca;
}
.pill-open::before { content: '●  '; }

.pill-open-today {
  background: #fff8e8;
  color: #8a6010;
  border: 1px solid #e8d090;
}

.pill-closed {
  background: #f0ece8;
  color: var(--closed-fg);
  border: 1px solid #d8d0c8;
}

.pill-season {
  background: #fdf0e8;
  color: var(--season-fg);
  border: 1px solid #e8c8a0;
}

.card-dist {
  font-size: 0.48rem;
  color: var(--closed-fg);
  letter-spacing: 0.06em;
}

.card-chevron {
  flex-shrink: 0;
  font-size: 0.55rem;
  color: var(--gold-dim);
  transition: transform 0.2s;
  padding-left: 0.3rem;
}
.card.collapsed .card-chevron { transform: rotate(-90deg); }

/* ── Expanded card area ── */
.card-expand-area {
  border-top: 1px solid var(--cream-dark);
}

/* Full dot-matrix image */
.card-img-full {
  width: 100%;
  position: relative;
  background: var(--ink);
  line-height: 0;
}

.card-img-full canvas {
  width: 100%;
  height: auto;
  display: block;
  image-rendering: pixelated;
}

.card-img-full .img-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(17,11,5,0.7), transparent);
  padding: 1.2rem 0.85rem 0.6rem;
  font-family: var(--font-fantasy);
  font-size: clamp(0.7rem, 3vw, 1rem);
  color: var(--gold-bright);
  text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  letter-spacing: 0.06em;
}

/* Sessions */
.card-body {
  padding: 0.85rem;
}

.sessions-today-label {
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.sessions-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.28rem;
}

.session-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.32rem 0.5rem;
  border-left: 3px solid var(--cream-dark);
  font-size: 0.6rem;
}

.session-row.now {
  border-left-color: var(--session-hl-border);
  background: var(--session-hl);
}

.session-name { color: var(--ink-mid); }
.session-time { color: var(--ink); font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; }
.session-row.now .session-name,
.session-row.now .session-time { color: #7a4a00; }

.no-sessions-msg {
  font-size: 0.58rem;
  color: var(--closed-fg);
  padding: 0.4rem 0;
  letter-spacing: 0.04em;
  line-height: 1.7;
}

.season-msg {
  font-size: 0.58rem;
  color: var(--season-fg);
  padding: 0.4rem 0;
  letter-spacing: 0.04em;
  line-height: 1.7;
}

/* Card footer */
.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.55rem 0.85rem;
  border-top: 1px solid var(--cream-dark);
  margin-top: 0.5rem;
}

.schedule-link {
  font-size: 0.52rem;
  color: var(--gold);
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.schedule-link:hover { color: var(--amber); }

.data-tag {
  font-size: 0.4rem;
  color: var(--cream-dark);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.data-tag.live { color: #a0c8a0; }

/* ── Footer ── */
.app-footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 0.5rem;
  color: var(--gold-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.app-footer a { color: var(--gold-dim); text-decoration: none; }
.app-footer a:hover { color: var(--gold); }

/* Loading */
.loading {
  text-align: center;
  padding: 4rem 2rem;
  font-family: var(--font-serif);
  font-size: 0.8rem;
  color: var(--gold-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

/* Desktop: widen a bit */
@media (min-width: 700px) {
  .cards { padding: 1.5rem 1rem 3rem; }
}
</style>
</head>
<body>

<header>
  <div class="title">Swim Day</div>
  <div class="subtitle">East Bay Aquatic Guide &nbsp;·&nbsp; Summer '81</div>
  <div class="header-meta">
    <div class="clock" id="clock">--:-- --</div>
    <div class="loc-badge" id="loc-badge">◎ Locating…</div>
  </div>
  <div class="date-bar">
    <button class="btn active" id="today-btn" onclick="setToday()">Today</button>
    <button class="btn" id="future-btn" onclick="toggleFuture()">Future Date</button>
    <div class="date-input-wrap" id="date-wrap">
      <input type="date" id="future-input" onchange="onDateChange()">
      <button class="btn" onclick="setToday()">✕</button>
    </div>
  </div>
  <div class="viewing-label" id="viewing-label"></div>
</header>

<div id="cards-root">
  <div class="loading" id="loading">Loading…</div>
</div>

<footer class="app-footer">
  Swim Day &nbsp;·&nbsp; East Bay CA &nbsp;·&nbsp;
  <a href="https://github.com/ainsleys/swimday" target="_blank" rel="noopener">github</a>
</footer>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let pools = null;
let userLat = null, userLng = null;
let viewDate = null; // null = today

// ── Utilities ───────────────────────────────────────────────────────────────
function parseTime(s) {
  if (!s) return -1;
  const m = s.toLowerCase().replace(/\s/g,'').match(/^(\d+):?(\d*)(am|pm)$/);
  if (!m) return -1;
  let h = +m[1], min = +(m[2]||0);
  if (m[3]==='pm' && h!==12) h+=12;
  if (m[3]==='am' && h===12) h=0;
  return h*60+min;
}

function nowMins() {
  const d=new Date(); return d.getHours()*60+d.getMinutes();
}

function dayOf(date) {
  return ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][date.getDay()];
}

function fmtTime(s) {
  // "7:00am" → "7:00 AM"
  return s.replace(':00','').toUpperCase().replace(/([AP]M)$/,' $1').trim();
}

function fmtDate(d) {
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=3959, dl=(lat2-lat1)*Math.PI/180, dL=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dl/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dL/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Time/Season logic ────────────────────────────────────────────────────────
function inSeason(pool, date) {
  if (!pool.seasonOpen) return true;
  return date >= new Date(pool.seasonOpen);
}

function sessionsFor(pool, date) {
  if (!inSeason(pool, date)) return [];
  const day = dayOf(date);
  return (pool.schedule && pool.schedule[day]) || [];
}

function openNow(pool) {
  if (viewDate) return false;
  const ss = sessionsFor(pool, new Date());
  if (!ss.length) return false;
  const nm = nowMins();
  return ss.some(s => nm >= parseTime(s.open) && nm < parseTime(s.close));
}

function openToday(pool, date) {
  return sessionsFor(pool, date).length > 0;
}

// ── Dot-matrix renderer ──────────────────────────────────────────────────────
const WARM_R=1.08, WARM_G=0.97, WARM_B=0.82; // warm tone filter

function renderDotMatrix(img, canvas) {
  const W = canvas.width, H = canvas.height;
  const SPACING = 5, MAX_R = 2.1;
  const ctx = canvas.getContext('2d');

  // Draw to offscreen
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0, W, H);
  const d = octx.getImageData(0, 0, W, H).data;

  // Cream background
  ctx.fillStyle = '#f0e4c2';
  ctx.fillRect(0, 0, W, H);

  for (let y = SPACING/2; y < H; y += SPACING) {
    for (let x = SPACING/2; x < W; x += SPACING) {
      const px = Math.min(Math.floor(x), W-1);
      const py = Math.min(Math.floor(y), H-1);
      const i = (py * W + px) * 4;
      const r = d[i], g = d[i+1], b = d[i+2];
      const bright = (r*0.299 + g*0.587 + b*0.114) / 255;
      const radius = (1 - bright) * MAX_R;
      if (radius < 0.25) continue;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI*2);
      ctx.fillStyle = `rgb(${Math.min(255,Math.round(r*WARM_R))},${Math.round(g*WARM_G)},${Math.min(255,Math.round(b*WARM_B))})`;
      ctx.fill();
    }
  }
}

// Render into a canvas element (or queue if image not loaded yet)
function loadAndRender(canvas, src) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => renderDotMatrix(img, canvas);
  img.onerror = () => {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#e0d0b0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  };
  img.src = src;
}

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const d=new Date();
  let h=d.getHours(), m=d.getMinutes(), s=d.getSeconds();
  const ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('clock').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
}
setInterval(updateClock,1000); updateClock();

// ── Date controls ────────────────────────────────────────────────────────────
function setToday() {
  viewDate = null;
  document.getElementById('today-btn').classList.add('active');
  document.getElementById('future-btn').classList.remove('active');
  document.getElementById('date-wrap').classList.remove('show');
  document.getElementById('viewing-label').classList.remove('show');
  if (pools) render();
}

function toggleFuture() {
  const wrap = document.getElementById('date-wrap');
  if (wrap.classList.contains('show')) { setToday(); return; }
  wrap.classList.add('show');
  document.getElementById('future-btn').classList.add('active');
  document.getElementById('today-btn').classList.remove('active');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('future-input').value = today;
  document.getElementById('future-input').min = today;
  onDateChange();
}

function onDateChange() {
  const v = document.getElementById('future-input').value;
  if (!v) return;
  const [y,mo,d] = v.split('-').map(Number);
  viewDate = new Date(y, mo-1, d);
  const lbl = document.getElementById('viewing-label');
  lbl.textContent = `Showing  ${fmtDate(viewDate).toUpperCase()}`;
  lbl.classList.add('show');
  if (pools) render();
}

// ── Geolocation ──────────────────────────────────────────────────────────────
function initGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude;
    userLng = p.coords.longitude;
    document.getElementById('loc-badge').textContent = `◎ ${userLat.toFixed(2)}°N`;
    if (pools) render();
  }, () => {
    document.getElementById('loc-badge').textContent = '';
  }, { timeout: 8000 });
}

// ── Render ────────────────────────────────────────────────────────────────────
function sortedPools() {
  const arr = Object.values(pools);
  // Sort: open now first, then by distance (or original order if no geo)
  arr.sort((a, b) => {
    const ao = openNow(a) ? 0 : 1, bo = openNow(b) ? 0 : 1;
    if (ao !== bo) return ao - bo;
    if (userLat !== null) {
      return haversine(userLat, userLng, a.lat, a.lng)
           - haversine(userLat, userLng, b.lat, b.lng);
    }
    return 0;
  });
  return arr;
}

function render() {
  const date = viewDate || new Date();
  const root = document.getElementById('cards-root');
  root.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'cards';

  for (const pool of sortedPools()) {
    wrap.appendChild(buildCard(pool, date));
  }
  root.appendChild(wrap);

  // Render dot-matrix images
  document.querySelectorAll('[data-pool-img]').forEach(canvas => {
    loadAndRender(canvas, `images/${canvas.dataset.poolImg}`);
  });
}

function buildCard(pool, date) {
  const ss = sessionsFor(pool, date);
  const isNow = openNow(pool);
  const isSeasonClosed = !inSeason(pool, date);
  const hasSessions = ss.length > 0;
  const nm = viewDate ? -1 : nowMins();

  // Cards that are not open today start collapsed
  const startCollapsed = !isNow && !hasSessions;

  const card = document.createElement('div');
  card.className = `card${isNow?' is-open-now':''}${startCollapsed?' collapsed':''}`;

  // ── Card header (always visible, tap to toggle) ──
  const head = document.createElement('div');
  head.className = 'card-head';
  head.onclick = () => toggleCard(card);

  // Thumb canvas (small, always shown)
  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'card-thumb';
  const thumbCanvas = document.createElement('canvas');
  thumbCanvas.width = 104; thumbCanvas.height = 104;
  thumbCanvas.dataset.poolImg = pool.image;
  thumbWrap.appendChild(thumbCanvas);
  head.appendChild(thumbWrap);

  // Name + status
  const headInfo = document.createElement('div');
  headInfo.className = 'card-head-info';

  const nameEl = document.createElement('div');
  nameEl.className = 'card-pool-name';
  nameEl.textContent = pool.name;
  headInfo.appendChild(nameEl);

  const statusRow = document.createElement('div');
  statusRow.className = 'card-status-row';

  // Status pill
  const pill = document.createElement('span');
  if (isNow) {
    pill.className = 'status-pill pill-open';
    pill.textContent = 'Open Now';
  } else if (isSeasonClosed) {
    pill.className = 'status-pill pill-season';
    pill.textContent = 'Seasonal';
  } else if (hasSessions) {
    pill.className = 'status-pill pill-open-today';
    pill.textContent = viewDate ? 'Open' : 'Open Today';
  } else {
    pill.className = 'status-pill pill-closed';
    pill.textContent = 'Closed';
  }
  statusRow.appendChild(pill);

  // Distance
  if (userLat !== null) {
    const dist = haversine(userLat, userLng, pool.lat, pool.lng);
    const distEl = document.createElement('span');
    distEl.className = 'card-dist';
    distEl.textContent = `${dist.toFixed(1)} mi`;
    statusRow.appendChild(distEl);
  }

  headInfo.appendChild(statusRow);
  head.appendChild(headInfo);

  // Chevron
  const chev = document.createElement('span');
  chev.className = 'card-chevron';
  chev.textContent = '▾';
  head.appendChild(chev);

  card.appendChild(head);

  // ── Expandable area ──
  const expand = document.createElement('div');
  expand.className = 'card-expand-area';

  // Full image
  const imgWrap = document.createElement('div');
  imgWrap.className = 'card-img-full';
  const fullCanvas = document.createElement('canvas');
  fullCanvas.width = 800; fullCanvas.height = 600;
  fullCanvas.style.aspectRatio = '4/3';
  fullCanvas.dataset.poolImg = pool.image;
  imgWrap.appendChild(fullCanvas);

  // Image label
  const imgLabel = document.createElement('div');
  imgLabel.className = 'img-label';
  imgLabel.textContent = pool.name;
  imgWrap.appendChild(imgLabel);

  expand.appendChild(imgWrap);

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  if (isSeasonClosed && pool.seasonalNote) {
    const msg = document.createElement('div');
    msg.className = 'season-msg';
    msg.textContent = pool.seasonalNote;
    body.appendChild(msg);
  } else if (!hasSessions) {
    const msg = document.createElement('div');
    msg.className = 'no-sessions-msg';
    msg.textContent = pool.fallbackNote || 'No sessions scheduled.';
    body.appendChild(msg);
  } else {
    const lbl = document.createElement('div');
    lbl.className = 'sessions-today-label';
    lbl.textContent = viewDate ? `Sessions · ${fmtDate(date)}` : "Today's Sessions";
    body.appendChild(lbl);

    const ul = document.createElement('ul');
    ul.className = 'sessions-list';
    ss.forEach(s => {
      const o = parseTime(s.open), c = parseTime(s.close);
      const active = nm >= 0 && nm >= o && nm < c;
      const li = document.createElement('li');
      li.className = `session-row${active?' now':''}`;
      li.innerHTML = `<span class="session-name">${s.label}</span><span class="session-time">${fmtTime(s.open)} – ${fmtTime(s.close)}</span>`;
      ul.appendChild(li);
    });
    body.appendChild(ul);
  }

  expand.appendChild(body);

  // Footer
  const foot = document.createElement('div');
  foot.className = 'card-foot';
  const link = document.createElement('a');
  link.className = 'schedule-link';
  link.href = pool.website;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = '↗ Full Schedule';
  link.onclick = e => e.stopPropagation();
  const tag = document.createElement('span');
  tag.className = `data-tag${pool.dataSource==='live'?' live':''}`;
  tag.textContent = pool.dataSource==='live' ? '● live data' : '○ estimated';
  foot.appendChild(link);
  foot.appendChild(tag);
  expand.appendChild(foot);

  card.appendChild(expand);
  return card;
}

function toggleCard(card) {
  card.classList.toggle('collapsed');
  // Trigger dot-matrix render on expand if not yet done
  card.querySelectorAll('canvas[data-pool-img]').forEach(c => {
    if (!c._rendered) {
      loadAndRender(c, `images/${c.dataset.poolImg}`);
      c._rendered = true;
    }
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('data/schedules.json');
    const data = await resp.json();
    pools = data.pools;
    document.getElementById('loading').remove();
    render();
  } catch(e) {
    document.getElementById('loading').textContent = 'Failed to load schedule data.';
  }
  initGeo();
  setInterval(() => { if (pools && !viewDate) render(); }, 60000);
}

init();
</script>
</body>
</html>
